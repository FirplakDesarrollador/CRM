# .github/workflows/revision-produccion.yml
# ─────────────────────────────────────────────────────────────────────────────
# REVISOR AUTOMÁTICO DE CÓDIGO ANTES DE PRODUCCIÓN
# Se ejecuta cuando el usuario abre un PR hacia main (= producción)
# Si todas las verificaciones pasan → aprobación automática → puede hacer merge
# Si algo falla → mensaje claro en el PR explicando qué corregir
# ─────────────────────────────────────────────────────────────────────────────

name: Revisión automática — acceso a producción

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write
  checks: write

jobs:

  # ───────────────────────────────────────────────
  # CHECK 1 — Credenciales expuestas (TruffleHog)
  # ───────────────────────────────────────────────
  check-credenciales:
    name: Verificar credenciales expuestas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Escanear con TruffleHog
        id: trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
        continue-on-error: true

      - name: Comentar si hay credenciales
        if: steps.trufflehog.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Se encontraron credenciales en el código\n\n**Este PR no puede pasar a producción** hasta resolver esto.\n\n**Qué hacer:**\n1. Busca en tu código cualquier API key, token o password escrito directamente\n2. Muévelo a tu archivo \`.env.local\` como variable de entorno\n3. En el código, reemplázalo por \`process.env.NOMBRE_VARIABLE\`\n4. Contacta al equipo IT para rotar la credencial expuesta — aunque la quites del código, ya fue expuesta\n\n> ⚠️ Si la credencial llegó al repositorio aunque sea un momento, debe ser rotada (generar una nueva en el servicio correspondiente).`
            })

      - name: Fallar si hay credenciales
        if: steps.trufflehog.outcome == 'failure'
        run: exit 1

  # ───────────────────────────────────────────────
  # CHECK 2 — ESLint de seguridad
  # ───────────────────────────────────────────────
  check-eslint:
    name: Verificar código seguro (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Ejecutar ESLint
        id: eslint
        run: |
          npm run lint -- \
            --format json \
            --output-file eslint-output.json \
            --no-error-on-unmatched-pattern || true

      - name: Evaluar resultados
        id: evaluar
        run: |
          SECURITY_ERRORS=$(node -e "
            const fs = require('fs');
            try {
              const data = JSON.parse(fs.readFileSync('eslint-output.json','utf8'));
              const errors = data.reduce((acc, file) => {
                return acc + file.messages.filter(m =>
                  m.severity === 2 && m.ruleId && (
                    m.ruleId.startsWith('security/') ||
                    m.ruleId === 'no-secrets/no-secrets' ||
                    m.ruleId === 'react/no-danger' ||
                    m.ruleId === 'no-eval' ||
                    m.ruleId === 'no-new-func'
                  )
                ).length;
              }, 0);
              console.log(errors);
            } catch(e) { console.log(0); }
          ")
          echo "security_errors=$SECURITY_ERRORS" >> $GITHUB_OUTPUT

      - name: Comentar errores de seguridad
        if: steps.evaluar.outputs.security_errors != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let data = [];
            try { data = JSON.parse(fs.readFileSync('eslint-output.json','utf8')); } catch(e) {}
            const lines = [];
            data.forEach(file => {
              const secErrors = file.messages.filter(m =>
                m.severity === 2 && m.ruleId && (
                  m.ruleId.startsWith('security/') ||
                  m.ruleId === 'no-secrets/no-secrets' ||
                  m.ruleId === 'react/no-danger' ||
                  m.ruleId === 'no-eval'
                )
              );
              if (secErrors.length) {
                const fname = file.filePath.replace(process.env.GITHUB_WORKSPACE + '/', '');
                secErrors.forEach(e => {
                  lines.push(`- \`${fname}\` línea ${e.line}: **${e.ruleId}** — ${e.message}`);
                });
              }
            });
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ El código tiene problemas de seguridad\n\n**Este PR no puede pasar a producción** hasta resolver estos errores:\n\n${lines.join('\n')}\n\n**Qué hacer:**\n1. Ejecuta \`npm run lint\` en tu máquina para ver los errores\n2. Ejecuta \`npm run lint:fix\` para corregir los que se puedan automáticamente\n3. Los errores de credenciales deben corregirse manualmente\n4. Si no entiendes un error, contacta al equipo IT`
            });

      - name: Fallar si hay errores de seguridad
        if: steps.evaluar.outputs.security_errors != '0'
        run: exit 1

  # ───────────────────────────────────────────────
  # CHECK 3 — Variables de entorno bien configuradas
  # ───────────────────────────────────────────────
  check-env:
    name: Verificar configuración de variables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar .env.local no fue commiteado
        run: |
          if git ls-files | grep -qE "^\.env\.local$|^\.env$|^\.env\.production$"; then
            echo "ERROR: Archivo .env con valores reales fue commiteado"
            exit 1
          fi
          echo "OK: No hay archivos .env con valores reales en el repositorio"

      - name: Verificar que .env.example existe
        run: |
          if [ ! -f ".env.example" ]; then
            echo "ADVERTENCIA: No existe .env.example — se recomienda crearlo"
          else
            echo "OK: .env.example presente"
          fi

      - name: Verificar .gitignore protege archivos sensibles
        run: |
          REQUIRED=(".env.local" ".env" "*.pem" "*.key")
          MISSING=()
          for pattern in "${REQUIRED[@]}"; do
            if ! grep -qF "$pattern" .gitignore 2>/dev/null; then
              MISSING+=("$pattern")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ADVERTENCIA: Falta en .gitignore: ${MISSING[*]}"
          else
            echo "OK: .gitignore protege archivos sensibles"
          fi

      - name: Buscar process.env mal usado en cliente
        run: |
          # Variables sin NEXT_PUBLIC_ usadas en componentes cliente
          ISSUES=$(grep -rn "process\.env\.[^N]" \
            --include="*.tsx" --include="*.jsx" \
            --exclude-dir=.next --exclude-dir=node_modules \
            . 2>/dev/null | \
            grep -v "NEXT_PUBLIC_" | \
            grep -v "// " | head -20 || true)
          if [ -n "$ISSUES" ]; then
            echo "ADVERTENCIA: Variables de servidor usadas en componentes cliente:"
            echo "$ISSUES"
          else
            echo "OK: Variables de entorno usadas correctamente"
          fi

  # ───────────────────────────────────────────────
  # CHECK 4 — Dependencias sin vulnerabilidades
  # ───────────────────────────────────────────────
  check-dependencias:
    name: Verificar dependencias seguras
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Auditar vulnerabilidades críticas
        id: audit
        run: |
          CRITICAL=$(npm audit --json 2>/dev/null | \
            node -e "
              let d='';
              process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                try {
                  const j=JSON.parse(d);
                  const c=(j.metadata?.vulnerabilities?.critical||0) +
                           (j.metadata?.vulnerabilities?.high||0);
                  console.log(c);
                } catch(e){ console.log(0); }
              });
            ") || echo "0"
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "Vulnerabilidades críticas/altas: $CRITICAL"

      - name: Comentar si hay vulnerabilidades críticas
        if: steps.audit.outputs.critical != '0'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Dependencias con vulnerabilidades\n\nSe encontraron vulnerabilidades críticas o altas en los paquetes npm.\n\n**Qué hacer:**\n1. Ejecuta \`npm audit\` para ver el detalle\n2. Ejecuta \`npm audit fix\` para corregir las que tienen solución automática\n3. Si no tienen solución automática, contacta al equipo IT\n\n> Este check es una advertencia — no bloquea el merge, pero debe resolverse pronto.`
            });

  # ───────────────────────────────────────────────
  # CHECK 5 — Build exitoso
  # ───────────────────────────────────────────────
  check-build:
    name: Verificar que la app compila
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build de Next.js
        run: npm run build
        env:
          # Variables mínimas para que el build no falle por env faltantes
          NEXTAUTH_SECRET: "build-test-secret-32-chars-minimum"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

      - name: Comentar si el build falla
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ La aplicación no compila\n\nEl build de Next.js falló. Esto significa que hay errores en el código que impedirían que la app funcione en producción.\n\n**Qué hacer:**\n1. Ejecuta \`npm run build\` en tu máquina\n2. Lee los errores que aparecen\n3. Pídele a la IA que corrija los errores (copia y pega el mensaje de error)\n4. Si no puedes resolverlo, contacta al equipo IT`
            });

  # ───────────────────────────────────────────────
  # RESULTADO FINAL — Aprobación automática
  # Solo se ejecuta si todos los checks pasaron
  # ───────────────────────────────────────────────
  aprobacion-automatica:
    name: Aprobar PR automáticamente
    runs-on: ubuntu-latest
    needs:
      [check-credenciales, check-eslint, check-env, check-dependencias, check-build]
    if: success()
    steps:
      - name: Aprobar PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: `## ✅ Revisión automática aprobada\n\nTodas las verificaciones de seguridad pasaron:\n\n- ✅ Sin credenciales expuestas\n- ✅ Código seguro (ESLint)\n- ✅ Variables de entorno correctas\n- ✅ Dependencias sin vulnerabilidades críticas\n- ✅ Build exitoso\n\nEste PR puede hacer merge a producción.\n\n> *Revisión automática por el sistema de seguridad IT*`
            });

      - name: Mensaje final al usuario
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Listo para producción\n\nTu aplicación pasó todas las verificaciones de seguridad y está lista para conectarse a APIs de producción.\n\n**Próximos pasos:**\n1. Haz merge de este PR\n2. Contacta al equipo IT para recibir las credenciales de producción\n3. Configura las variables en tu archivo \`.env.local\` con los valores reales\n\n> Recuerda: **nunca compartas** las credenciales de producción con nadie, ni las subas al repositorio.`
            });
